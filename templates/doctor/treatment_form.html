{% extends 'base.html' %}
{% block subtitle %}Treatment Details{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="hms-card" style="width: 100%; max-width: 800px;">
        
        <div class="d-flex justify-content-between align-items-center mb-5 pb-4" style="border-bottom: 1px solid var(--hms-border);">
            <div>
                <h2 class="page-title mb-1">Log Treatment</h2>
                <p class="body-text mb-0">Patient: <span style="font-weight: 600; color: var(--hms-dark);">{{ appointment.patient.name }}</span></p>
            </div>
            <div>
                <a href="{{ url_for('doctor.doctor_dashboard') }}" class="btn hms-btn-outline" style="font-size: 0.875rem;">
                    <i class="bi bi-arrow-left me-1"></i> Dashboard
                </a>
            </div>
        </div>

        <form method="POST">
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="hms-label" for="visit">Visit Type</label>
                    <input type="text" class="hms-input" name="visit" id="visit" placeholder="e.g. In-Person, Follow-up" required>
                </div>

                <div class="col-md-6">
                    <label class="hms-label" for="test">Tests Done</label>
                    <input type="text" class="hms-input" name="test" id="test" placeholder="e.g. Blood Test, X-Ray" required>
                </div>

                <div class="col-12 mt-4">
                    <label class="hms-label" for="diagnosis">Diagnosis</label>
                    <textarea class="hms-input" name="diagnosis" id="diagnosis" rows="3" placeholder="Enter clinical diagnosis" required></textarea>
                </div>

                <div class="col-12 mt-4">
                    <label class="hms-label" for="medicines">Medicines</label>
                    <textarea class="hms-input" name="medicines" id="medicines" rows="2" placeholder="List prescribed medications" required></textarea>
                </div>

                <div class="col-12 mt-4">
                    <label class="hms-label" for="prescription">Prescription & Notes</label>
                    <textarea class="hms-input" name="prescription" id="prescription" rows="4" placeholder="Detailed notes for the patient" required></textarea>
                </div>
            </div>

            <div class="d-flex justify-content-end pt-4 mt-2" style="border-top: 1px solid var(--hms-border);">
                <a href="{{ url_for('doctor.doctor_dashboard') }}" class="btn hms-btn-outline me-3">Cancel</a>
                <button type="submit" class="btn hms-btn-primary px-5">Save Record</button>
            </div>
        </form>
        
    </div>
</div>
{% endblock %}
