{% extends 'base.html' %}
{% block subtitle %}Sign In{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh; padding: 40px 0;">
    <div class="hms-card" style="width: 100%; max-width: 420px;">
        
        <div class="text-center mb-4">
            <h1 style="font-size: 2rem; font-weight: 800; color: var(--hms-primary); letter-spacing: -1px; margin-bottom: 8px;">HMS</h1>
            <p class="body-text mb-0">Sign in to your account</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="hms-label" for="email">Email Address</label>
                <input type="email" class="hms-input" id="email" name="email" placeholder="name@hospital.com" required>
            </div>
            
            <div class="mb-3">
                <label class="hms-label" for="password">Password</label>
                <input type="password" class="hms-input" id="password" name="pass" placeholder="••••••••" required>
            </div>
            
            <div class="mb-4">
                <label class="hms-label" for="role">Account Type</label>
                <select class="hms-input" id="role" name="role" required style="cursor: pointer;">
                    <option value="patient" selected>Patient Access</option>
                    <option value="doctor">Medical Staff</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            
            <button type="submit" class="btn hms-btn-primary w-100 py-2" style="font-size: 1rem;">Sign In</button>
        </form>

        <div class="text-center mt-4 pt-4" style="border-top: 1px solid var(--hms-border);">
            <span class="body-text" style="font-size: 0.875rem;">New here? </span>
            <a href="{{ url_for('auth.register') }}" style="color: var(--hms-primary); font-weight: 500; font-size: 0.875rem; text-decoration: none;">Create an account</a>
        </div>
        
    </div>
</div>
{% endblock %}
