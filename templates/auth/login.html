{% extends 'base.html' %}
{% block title %}Sign In to MedCare{% endblock %}

{% block content %}
<div class="auth-wrapper" style="background-color: #f8fafd;">
    <div class="auth-card animate-fade-up">
        <!-- Sidebar Graphic -->
        <div class="auth-sidebar d-none d-md-flex position-relative overflow-hidden">
            <div class="position-relative" style="z-index: 2;">
                <div class="badge rounded-pill bg-white text-primary mb-4 px-3 py-2 fw-bold shadow-sm">
                    MedCare
                </div>
                <h2 class="fw-bolder display-6 mb-3">Welcome Back.</h2>
                <p class="fs-5 opacity-75">Connect to your portal to manage your health or hospital operations securely.</p>
            </div>
            <!-- Decorative circle -->
            <div class="position-absolute" style="width: 300px; height: 300px; background: rgba(255,255,255,0.1); border-radius: 50%; bottom: -50px; right: -50px;"></div>
        </div>

        <!-- Form Area -->
        <div class="auth-form-area d-flex flex-column justify-content-center">
            <div class="mb-5 text-center">
                <h3 class="fw-bolder mb-2 text-dark">Sign In</h3>
                <p class="text-muted">Enter your details to proceed.</p>
            </div>
            
            <form method="POST">
                <div class="mb-4">
                    <label for="email" class="form-label fw-semibold text-muted small text-uppercase">Email Address</label>
                    <input type="email" class="modern-input w-100" name="email" id="email" placeholder="you@example.com" required>
                </div>
                
                <div class="mb-4">
                    <label for="pass" class="form-label fw-semibold text-muted small text-uppercase">Password</label>
                    <input type="password" class="modern-input w-100" name="pass" id="pass" placeholder="••••••••" required>
                </div>
                
                <div class="mb-4">
                    <label for="role-select" class="form-label fw-semibold text-muted small text-uppercase">Account Type</label>
                    <select id="role-select" class="modern-input w-100" name="role" required>
                        <option value="patient" selected>Patient</option>
                        <option value="doctor">Doctor</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                
                <div class="mt-5 text-center">
                    <button type="submit" class="btn modern-btn-primary w-100 py-3 rounded-pill fs-5 shadow-sm mb-3">Sign In</button>
                    <p class="text-muted">Are you a new user? <a href="{{url_for('auth.register')}}" class="text-primary fw-bold text-decoration-none">Register here</a></p>
                </div>
            </form> 
        </div>
    </div>
</div>
{% endblock %}
