{% extends 'base.html' %}
{% block subtitle %}Register{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh; padding: 40px 0;">
    <div class="hms-card" style="width: 100%; max-width: 480px;">
        
        <div class="text-center mb-4">
            <h1 style="font-size: 2rem; font-weight: 800; color: var(--hms-primary); letter-spacing: -1px; margin-bottom: 8px;">HMS</h1>
            <p class="body-text mb-0">Create your account</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="hms-label" for="name">Full Name</label>
                <input type="text" class="hms-input" id="name" name="username" required>
            </div>

            <div class="mb-3">
                <label class="hms-label" for="email">Email Address</label>
                <input type="email" class="hms-input" id="email" name="email" required>
            </div>

            <div class="mb-3">
                <label class="hms-label" for="phone">Phone Number</label>
                <input type="tel" class="hms-input" id="phone" name="phone" required>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-6">
                    <label class="hms-label" for="password">Password</label>
                    <input type="password" class="hms-input" id="password" name="pass" required>
                </div>
                <div class="col-6">
                    <label class="hms-label" for="confirm_password">Confirm</label>
                    <input type="password" class="hms-input" id="confirm_password" name="cpass" required>
                </div>
            </div>
            
            <button type="submit" class="btn hms-btn-primary w-100 py-2" style="font-size: 1rem;">Create Account</button>
        </form>

        <div class="text-center mt-4 pt-4" style="border-top: 1px solid var(--hms-border);">
            <span class="body-text" style="font-size: 0.875rem;">Already have an account? </span>
            <a href="{{ url_for('auth.login') }}" style="color: var(--hms-primary); font-weight: 500; font-size: 0.875rem; text-decoration: none;">Sign in here</a>
        </div>
        
    </div>
</div>
{% endblock %}
