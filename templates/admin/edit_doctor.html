{% extends 'base.html' %}
{% block subtitle %}Edit Doctor Profile{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="hms-card" style="width: 100%; max-width: 600px;">
        
        <div class="mb-4 pb-4" style="border-bottom: 1px solid var(--hms-border);">
            <h2 class="page-title mb-1">Edit Doctor Profile</h2>
            <p class="body-text mb-0">Update information for Dr. {{ doctor.user.name }}</p>
        </div>

        <form method="POST">
            <div class="row g-4 mb-4">
                <div class="col-12">
                    <label class="hms-label">Doctor Name</label>
                    <input type="text" class="hms-input" name="name" value="{{ doctor.user.name }}" required>
                </div>

                <div class="col-12">
                    <label class="hms-label">Assigned Department</label>
                    <select class="hms-input" name="dept_id" required>
                        {% for dept in departments %}
                            <option value="{{ dept.id }}" {% if dept.id == doctor.dept_id %}selected{% endif %}>
                                {{ dept.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-12">
                    <label class="hms-label">Doctor's Bio</label>
                    <textarea class="hms-input" name="description" rows="5" required>{{ doctor.description }}</textarea>
                </div>
            </div>

            <div class="d-flex justify-content-end pt-4 mt-2" style="border-top: 1px solid var(--hms-border);">
                <a href="{{ url_for('admin.admin_dashboard') }}" class="btn hms-btn-outline me-3">Cancel</a>
                <button type="submit" class="btn hms-btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
