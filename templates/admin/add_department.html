{% extends 'base.html' %}
{% block subtitle %}Add Department{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="hms-card" style="width: 100%; max-width: 600px;">
        
        <div class="mb-4 pb-4" style="border-bottom: 1px solid var(--hms-border);">
            <h2 class="page-title mb-1">Add Department</h2>
            <p class="body-text mb-0">Register a new medical division.</p>
        </div>

        <form method="POST">
            <div class="row g-4 mb-5">
                <div class="col-12">
                    <label class="hms-label">Department Name</label>
                    <input type="text" class="hms-input" name="name" placeholder="e.g. Cardiology" required>
                </div>

                <div class="col-12">
                    <label class="hms-label">Description</label>
                    <textarea class="hms-input" name="description" rows="4" placeholder="Overview of the department's focus..." required></textarea>
                </div>
            </div>

            <div class="d-flex justify-content-end pt-4" style="border-top: 1px solid var(--hms-border);">
                <a href="{{ url_for('admin.admin_dashboard') }}" class="btn hms-btn-outline me-3">Cancel</a>
                <button type="submit" class="btn hms-btn-primary">Register Department</button>
            </div>
        </form>
        
    </div>
</div>
{% endblock %}
