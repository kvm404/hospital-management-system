{% extends 'base.html' %}
{% block subtitle %}Add New Doctor{% endblock %}

{% block navbrand %}
<span class="fs-4 fw-bolder text-dark">Staff Management</span>
{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 800px;">
    
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <div>
            <h2 class="fw-bolder mb-0 text-dark">Onboard Doctor</h2>
            <p class="text-muted fs-5">Create a new specialist account.</p>
        </div>
        <div>
            <a href="{{ url_for('admin.admin_dashboard') }}" class="btn btn-outline-secondary rounded-pill px-4 shadow-sm">&larr; Dashboard</a>
        </div>
    </div>

    <div class="dashboard-card border-0 shadow-sm rounded-4 position-relative overflow-hidden bg-white mt-4">
        <div class="position-absolute top-0 start-0 w-100 bg-primary" style="height: 5px;"></div>
        
        <div class="card-body p-4 p-md-5">
            <form method="POST">
                
                <!-- Section 1: Credentials -->
                <div class="d-flex align-items-center mb-4">
                    <div class="bg-primary-soft rounded-circle d-flex justify-content-center align-items-center me-3" style="width: 40px; height: 40px;">
                        <span class="fs-5">🔐</span>
                    </div>
                    <h5 class="fw-bold mb-0 text-dark">Login Credentials</h5>
                </div>
                
                <div class="row g-4 mb-5">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold text-muted small text-uppercase">Full Name</label>
                        <input type="text" class="modern-input w-100" name="name" placeholder="Dr. John Doe" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold text-muted small text-uppercase">Phone</label>
                        <input type="text" class="modern-input w-100" name="phone" placeholder="+123456789" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold text-muted small text-uppercase">Email</label>
                        <input type="email" class="modern-input w-100" name="email" placeholder="doctor@medcare.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold text-muted small text-uppercase">Initial Password</label>
                        <input type="password" class="modern-input w-100" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <hr class="text-muted opacity-25 mb-5">

                <!-- Section 2: Professional Details -->
                <div class="d-flex align-items-center mb-4">
                    <div class="bg-info-soft rounded-circle d-flex justify-content-center align-items-center me-3" style="width: 40px; height: 40px;">
                        <span class="fs-5">🩺</span>
                    </div>
                    <h5 class="fw-bold mb-0 text-dark">Professional Details</h5>
                </div>
                
                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label fw-semibold text-muted small text-uppercase">Assigned Department</label>
                        <select class="modern-input w-100 bg-light" name="dept_id" required>
                            <option value="" disabled selected>Select Department...</option>
                            {% if departments %}
                                {% for dept in departments %}
                                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                                {% endfor %}
                            {% else %}
                                <option disabled>No departments found. Please add them first.</option>
                            {% endif %}
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold text-muted small text-uppercase">Doctor's Bio & Qualifications</label>
                        <textarea class="modern-input w-100" name="description" rows="4" placeholder="List qualifications, specializations, and professional background..." required></textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-5 pt-4 border-top gap-3">
                    <a href="{{ url_for('admin.admin_dashboard') }}" class="btn btn-light rounded-pill px-4 py-2 fs-6 fw-semibold">Cancel</a>
                    <button type="submit" class="btn modern-btn-primary rounded-pill px-5 py-2 shadow-sm fs-6 fw-semibold">Create Doctor Account</button>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
