{% extends 'base.html' %}
{% block subtitle %}Add New Doctor{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="hms-card" style="width: 100%; max-width: 700px;">
        
        <div class="mb-5 pb-4" style="border-bottom: 1px solid var(--hms-border);">
            <h2 class="page-title mb-1">Onboard Doctor</h2>
            <p class="body-text mb-0">Create a new specialist account.</p>
        </div>

        <form method="POST">
            
            <h4 class="section-heading mb-4">Login Credentials</h4>
            
            <div class="row g-4 mb-5">
                <div class="col-md-6">
                    <label class="hms-label">Full Name</label>
                    <input type="text" class="hms-input" name="name" placeholder="John Doe" required>
                </div>
                <div class="col-md-6">
                    <label class="hms-label">Phone</label>
                    <input type="text" class="hms-input" name="phone" placeholder="+123456789" required>
                </div>
                <div class="col-md-6">
                    <label class="hms-label">Email</label>
                    <input type="email" class="hms-input" name="email" placeholder="doctor@hms.com" required>
                </div>
                <div class="col-md-6">
                    <label class="hms-label">Initial Password</label>
                    <input type="password" class="hms-input" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <hr style="color: var(--hms-border); margin: 32px 0;">

            <h4 class="section-heading mb-4">Professional Details</h4>
            
            <div class="row g-4 mb-5">
                <div class="col-12">
                    <label class="hms-label">Assigned Department</label>
                    <select class="hms-input" name="dept_id" required>
                        <option value="" disabled selected>Select Department...</option>
                        {% if departments %}
                            {% for dept in departments %}
                                <option value="{{ dept.id }}">{{ dept.name }}</option>
                            {% endfor %}
                        {% else %}
                            <option disabled>No departments found. Please add them first.</option>
                        {% endif %}
                    </select>
                </div>

                <div class="col-12">
                    <label class="hms-label">Doctor's Bio & Qualifications</label>
                    <textarea class="hms-input" name="description" rows="4" placeholder="List qualifications, specializations, and professional background..." required></textarea>
                </div>
            </div>

            <div class="d-flex justify-content-end pt-4" style="border-top: 1px solid var(--hms-border);">
                <a href="{{ url_for('admin.admin_dashboard') }}" class="btn hms-btn-outline me-3">Cancel</a>
                <button type="submit" class="btn hms-btn-primary">Create Doctor Account</button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
