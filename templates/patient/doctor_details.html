{% extends 'base.html' %}
{% block subtitle %}Dr. {{ doctor.user.name }}{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="hms-card" style="width: 100%; max-width: 700px;">
        
        <div class="text-center mb-5 pb-4" style="border-bottom: 1px solid var(--hms-border);">
            <div class="hms-icon-circle hms-icon-circle-lg hms-icon-primary mx-auto mb-4" style="width: 80px; height: 80px; font-size: 2.5rem;">
                <i class="bi bi-person-badge"></i>
            </div>
            <h2 class="page-title mb-2">Dr. {{ doctor.user.name }}</h2>
            <span class="hms-badge hms-badge-info">{{ doctor.department.name }}</span>
        </div>

        <div class="mb-5">
            <h4 class="section-heading mb-3">Professional Bio</h4>
            <p class="body-text" style="line-height: 1.7;">{{ doctor.description }}</p>
        </div>

        <div class="d-flex justify-content-between pt-4" style="border-top: 1px solid var(--hms-border);">
            <button onclick="history.back()" class="btn hms-btn-outline">
                <i class="bi bi-arrow-left me-1"></i> Go Back
            </button>
            <a href="{{ url_for('patient.check_availability', doctor_id=doctor.user_id) }}" class="btn hms-btn-primary">
                Book Consultation
            </a>
        </div>
        
    </div>
</div>
{% endblock %}
